name: campus-coffee

services:
  app:
    # `gcloud beta run compose up` builds this from source via Cloud Build (no prebuilt image to
    # pull); local `docker compose up` builds the same context from the Dockerfile.
    build:
      context: .
    container_name: campus-coffee-app-dev
    networks:
      - campus-coffee-net
    ports:
      - '8080:8080'
    # wait until Postgres accepts connections: the app runs Flyway at startup and exits permanently
    # when the database is still initializing (typical on the first `docker compose up`)
    depends_on:
      db:
        condition: service_healthy
    restart: on-failure
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/postgres
      - SPRING_PROFILES_ACTIVE=dev

  db:
    image: 'postgres:17-alpine'
    container_name: db
    networks:
      - campus-coffee-net
    ports:
      - '5432:5432'
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 5s
      retries: 15

networks:
  campus-coffee-net:
